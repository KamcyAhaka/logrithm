name: Deploy — Logrithm

on:
  push:
    branches: [main, beta]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to (alpha, beta, production)'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - beta
          - production

# Only one deploy per branch at a time. cancel-in-progress is false so a
# real deploy is never interrupted by a follow-up semantic-release commit push.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  PROJECT_ID: logrithm-ai
  REGION: us-central1
  SERVICE: logrithm
  IMAGE: us-central1-docker.pkg.dev/logrithm-ai/logrithm/logrithm

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.head_commit && !startsWith(github.event.head_commit.message, 'chore(release):'))

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 1.5 Set dynamic environment variables based on branch/input
      - name: Set environment variables
        env:
          EVENT_NAME: ${{ github.event_name }}
          ENVIRONMENT_INPUT: ${{ github.event.inputs.environment }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          ENV_TARGET=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ENV_TARGET="$ENVIRONMENT_INPUT"
          elif [ "$GITHUB_REF_NAME" = "beta" ]; then
            ENV_TARGET="beta"
          elif [ "$GITHUB_REF_NAME" = "main" ]; then
            ENV_TARGET="production"
          else
            ENV_TARGET="alpha"
          fi
          
          echo "Selected Environment: $ENV_TARGET"
          
          # Guard: Prevent manual/accidental deployment to production from non-release branches
          if [ "$ENV_TARGET" = "production" ]; then
            if [ "$GITHUB_REF_NAME" != "main" ] && [ "$GITHUB_REF_NAME" != "beta" ]; then
              echo "Error: Deployment to production environment is restricted to 'main' and 'beta' branches only (current branch: $GITHUB_REF_NAME)."
              exit 1
            fi
          fi
          
          if [ "$ENV_TARGET" = "alpha" ]; then
            echo "SERVICE=logrithm-alpha" >> $GITHUB_ENV
            echo "SITE=logrithm-ai-alpha" >> $GITHUB_ENV
          elif [ "$ENV_TARGET" = "beta" ]; then
            echo "SERVICE=logrithm-beta" >> $GITHUB_ENV
            echo "SITE=logrithm-ai-beta" >> $GITHUB_ENV
          elif [ "$ENV_TARGET" = "production" ]; then
            echo "SERVICE=logrithm" >> $GITHUB_ENV
            echo "SITE=logrithm-ai" >> $GITHUB_ENV
          else
            echo "Error: Unknown target environment: $ENV_TARGET"
            exit 1
          fi

      # 2. Setup Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # 3. Install root dependencies
      - name: Install root deps
        run: bun install

      # 4. Install functions dependencies
      - name: Install functions deps
        run: bun install
        working-directory: functions

      # 5. Build Next.js (standalone output)
      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

      # 6. Authenticate with GCP
      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      # 7. Setup gcloud CLI
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # 8. Configure Docker for Artifact Registry
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # 9. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .

      # 10. Push to Artifact Registry
      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # 11. Deploy to Cloud Run (max-instances: 5 — never change)
      - name: Deploy Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 5

      # 12. Install Firebase CLI
      - name: Install Firebase CLI
        run: bun install -g firebase-tools

      # 13. Deploy Cloud Functions + Firestore rules
      - name: Deploy functions & rules
        run: firebase deploy --only functions,firestore:rules --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # 14. Stamp public/ with deploy metadata so Firebase sees a new content hash.
      #     Firebase Hosting returns 400 when the version hash matches the active
      #     release. GITHUB_RUN_ID is unique per workflow run (not per commit),
      #     so this is safe even on re-runs of the same SHA.
      - name: Write deploy fingerprint
        run: |
          printf '{"runId":"%s","attempt":"%s","sha":"%s","ref":"%s"}' \
            "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" \
            "${{ github.sha }}" "${{ github.ref_name }}" \
            > public/deploy.json

      # 15. Deploy Hosting
      - name: Deploy Hosting
        run: firebase deploy --only hosting:${{ env.SITE }} --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
