name: Deploy to Firebase & Cloud Run

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Root Dependencies
        run: bun install

      - name: Install Functions Dependencies
        run: cd functions && bun install

      - name: Build Next.js (Standalone)
        run: bun run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.FIREBASE_PROJECT_ID }}/logrithm/logrithm:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/${{ secrets.FIREBASE_PROJECT_ID }}/logrithm/logrithm:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy logrithm \
            --image us-central1-docker.pkg.dev/${{ secrets.FIREBASE_PROJECT_ID }}/logrithm/logrithm:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 2

      - name: Deploy Firebase Configs
        run: |
          export FIREBASE_TOKEN=${{ secrets.FIREBASE_TOKEN }}
          bunx firebase-tools deploy --only functions,hosting,firestore:rules --project ${{ secrets.FIREBASE_PROJECT_ID }}
